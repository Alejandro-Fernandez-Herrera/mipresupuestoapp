{% extends "base.html" %}
{% block title %}Correo enviado — Finanzas Hogar{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white rounded-lg shadow-md p-6 mt-8 text-center">
    <h1 class="text-2xl font-bold text-green-600 mb-4">Correo enviado</h1>
    <p class="text-gray-600 mb-6">
        Si el correo está registrado, recibirás instrucciones para restablecer tu contraseña.
    </p>
    <a href="{% url 'accounts:login' %}"
       class="inline-block bg-blue-600 text-white py-2 px-6 rounded-md hover:bg-blue-700 transition">
        Volver al inicio de sesión
    </a>
</div>
{% endblock %}
