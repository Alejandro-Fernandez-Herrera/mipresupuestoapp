{% extends "base.html" %}
{% block title %}{{ titulo }} — Finanzas Hogar{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto">
    <h1 class="text-2xl font-bold mb-6">{{ titulo }}</h1>

    <div class="bg-white rounded-lg shadow p-6">
        <form method="post" class="space-y-4">
            {% csrf_token %}

            {% for field in form %}
            <div>
                <label class="block text-sm font-medium text-gray-700">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                <p class="text-red-500 text-xs mt-1">{{ field.errors.0 }}</p>
                {% endif %}
            </div>
            {% endfor %}

            <div class="flex justify-between pt-4">
                <a href="{% url 'gastos:categorias' %}" class="px-4 py-2 border border-gray-300 rounded text-gray-700 hover:bg-gray-50">Cancelar</a>
                <button type="submit" class="px-6 py-2 bg-green-600 text-white rounded hover:bg-green-700">Guardar</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
