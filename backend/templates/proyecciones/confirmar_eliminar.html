{% extends "base.html" %}

{% block title %}Confirmar Eliminación — Finanzas Hogar{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-8">
    <div class="bg-white rounded-lg shadow p-6 text-center">
        <p class="text-lg mb-4">¿Eliminar esta proyección?</p>
        <p class="text-gray-500 text-sm mb-6">{{ objeto }}</p>
        <form method="post" class="flex justify-center space-x-3">
            {% csrf_token %}
            <a href="{% url url_cancelar %}" class="px-4 py-2 border border-gray-300 rounded text-sm hover:bg-gray-50">Cancelar</a>
            <button type="submit" class="px-4 py-2 bg-red-600 text-white rounded text-sm hover:bg-red-700">Eliminar</button>
        </form>
    </div>
</div>
{% endblock %}
